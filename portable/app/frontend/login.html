<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema JPL</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body class="login-body">

<div class="login-box">
    <h2>Acesso ao Sistema</h2>

    <input id="email" type="text" placeholder="Usuario" autocomplete="username" required>
    <input id="password" type="password" placeholder="Senha" autocomplete="current-password" required>

    <button id="btnLogin">Entrar</button>

    <p id="loginMsg"></p>
</div>

<script type="module">
import { loginUser } from "./js/auth.js";

document.getElementById("btnLogin").addEventListener("click", async () => {
    const msg = document.getElementById("loginMsg");
    msg.textContent = "Validando...";

    const user = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    try {
        const res = await loginUser(user, pass);
        if (res?.ok) {
            msg.textContent = "Acesso permitido.";
            window.location.href = "index.html";
        } else {
            msg.textContent = "Credenciais invalidas.";
        }
    } catch {
        msg.textContent = "Erro no login local.";
    }
});
</script>

</body>
</html>
