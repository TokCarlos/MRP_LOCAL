<h2>Produtos</h2>

<button class="btn-add" id="btnAddProd">+ Novo Produto</button>

<div class="produtos-filtros">
    <input id="filtroPesquisa" type="text" placeholder="Pesquisar produto, ATA, item ou empresa...">
    <select id="filtroAta">
        <option value="">Todas as ATAs</option>
    </select>
    <select id="filtroEmpresa">
        <option value="">Todas as Empresas</option>
    </select>
    <select id="filtroCategoria">
        <option value="">Todas as Categorias</option>
    </select>
    <button id="btnLimparFiltros" class="btn-row-action" type="button">Limpar</button>
</div>

<div id="produtosContador" class="produtos-contador">Exibindo 0 de 0 produtos</div>

<div class="table-responsive">
    <table class="preview-table produtos-table" id="tblProdutos">
        <thead>
            <tr>
                <th>ID</th>
                <th>PREVIEW</th>
                <th>ATA+Nº</th>
                <th>Nº ITEM</th>
                <th>PRODUTO</th>
                <th>EMPRESA</th>
                <th>AÇÃO</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="produtoLightbox" class="produto-lightbox hidden" aria-hidden="true">
    <button id="produtoLightboxClose" class="produto-lightbox-close" type="button" aria-label="Fechar">×</button>
    <div class="produto-lightbox-content">
        <img id="produtoLightboxImg" class="produto-lightbox-img" src="" alt="Preview ampliado do produto">
    </div>
</div>
